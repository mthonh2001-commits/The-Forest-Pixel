<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Forest-Pixel 🌲</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a3a1a 0%, #2d5a2d 100%);
            font-family: Arial, sans-serif;
        }
        
        .container {
            text-align: center;
            color: #fff;
        }
        
        h1 {
            font-size: 3em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        
        .subtitle {
            font-size: 1.2em;
            margin-bottom: 30px;
            opacity: 0.9;
        }
        
        .game-window {
            background: #000;
            border: 3px solid #4a7c4e;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0,0,0,0.7);
            margin-bottom: 30px;
        }
        
        canvas {
            display: block;
            max-width: 100%;
            height: auto;
        }
        
        .controls {
            background: rgba(0,0,0,0.3);
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
        }
        
        .control-item {
            margin: 10px 0;
            font-size: 1em;
        }
        
        .key {
            background: #4a7c4e;
            padding: 5px 10px;
            border-radius: 5px;
            font-weight: bold;
            display: inline-block;
            min-width: 50px;
        }
        
        .loading {
            font-size: 1.5em;
            margin: 20px 0;
        }
        
        .spinner {
            border: 3px solid rgba(255,255,255,0.3);
            border-top: 3px solid #fff;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        a {
            color: #90ee90;
            text-decoration: none;
        }
        
        a:hover {
            text-decoration: underline;
        }
        
        .footer {
            margin-top: 30px;
            opacity: 0.7;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌲 The Forest-Pixel</h1>
        <p class="subtitle">A 2D Pixel Survival Game</p>
        
        <div class="game-window">
            <div id="game"></div>
        </div>
        
        <div class="loading">
            <div class="spinner"></div>
            <p>Loading game...</p>
        </div>
        
        <div class="controls">
            <h2>🕹️ Điều khiển / Controls</h2>
            <div class="control-item">
                <span class="key">W A S D</span> - Di chuyển / Move
            </div>
            <div class="control-item">
                <span class="key">SPACE</span> - Tương tác Campfire / Interact Campfire
            </div>
            <div class="control-item">
                <span class="key">R</span> - Reset Stats
            </div>
            <p style="margin-top: 15px; opacity: 0.8;">
                📖 <a href="https://github.com/mthonh2001-commits/The-Forest-Pixel" target="_blank">GitHub Repository</a>
            </p>
        </div>
        
        <div class="footer">
            <p>Made with ❤️ using Godot Engine 4.1</p>
            <p>Inspired by 99 Nights in the Forest</p>
        </div>
    </div>

    <script>
        // Placeholder for Godot export script
        // In production, this would include the actual Godot HTML5 export
        console.log("Game loading...");
        
        // Remove loading spinner when game is ready
        window.addEventListener('load', function() {
            setTimeout(function() {
                document.querySelector('.loading').style.display = 'none';
            }, 3000);
        });
    </script>
</body>
</html>
